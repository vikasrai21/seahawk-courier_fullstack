name: Seahawk CI/CD Full-Stack Tests

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./backend

    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: './backend/package-lock.json'

    # 1. Install Backend Dependencies
    - name: Install Dependencies
      run: npm ci
      
    # 2. Generate Prisma Client (required for mocks)
    - name: Generate Prisma Client
      run: npx prisma generate

    # 3. Unit Tests & Coverage
    - name: Run Unit Tests & Measure Coverage 
      run: npm run test:ci
      env:
        JWT_SECRET: test-jwt-secret-ci
        NODE_ENV: test
        REDIS_URL: redis://localhost:6379
        DATABASE_URL: postgresql://mock:mock@localhost:5432/mock

    # 4. Upload Coverage Report
    - name: Upload Coverage to GitHub Actions
      uses: actions/upload-artifact@v4
      if: always() # Upload even if tests fail
      with:
        name: coverage-report
        path: ./backend/coverage/
        retention-days: 7
