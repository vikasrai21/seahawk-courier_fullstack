name: Seahawk CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Lint backend
        working-directory: backend
        run: npm run lint

      - name: Run backend tests
        working-directory: backend
        run: npm run test:ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Run frontend unit tests
        working-directory: frontend
        run: npm run test

      - name: Frontend smoke test
        working-directory: frontend
        run: npm run smoke

      - name: Build frontend
        working-directory: frontend
        run: npm run build:ci

      - name: Validate frontend build artifacts
        working-directory: frontend
        run: |
          test -d dist
          test -n "$(find dist -type f -print -quit)"
          test ! -f build_error.txt

  deploy-staging:
    name: Deploy to Railway Staging
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Notify staging deployment
        run: echo "✅ Tests passed — Railway staging auto-deploy should be triggered from develop"

      - name: Verify staging health endpoint
        env:
          HEALTHCHECK_URL: ${{ vars.STAGING_HEALTHCHECK_URL }}
        run: |
          test -n "$HEALTHCHECK_URL"
          curl --fail --silent --show-error "$HEALTHCHECK_URL/api/health"

  deploy-production:
    name: Deploy to Railway Production
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Notify production deployment
        run: echo "✅ Tests passed — Railway production auto-deploy should be triggered from main"

      - name: Verify production health endpoint
        env:
          HEALTHCHECK_URL: ${{ vars.PRODUCTION_HEALTHCHECK_URL }}
        run: |
          test -n "$HEALTHCHECK_URL"
          curl --fail --silent --show-error "$HEALTHCHECK_URL/api/health"
