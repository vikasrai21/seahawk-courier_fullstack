name: Seahawk CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Lint backend
        working-directory: backend
        run: npm run lint

      - name: Typecheck backend
        working-directory: backend
        run: npm run typecheck

      - name: Run backend tests
        working-directory: backend
        run: npm run test:ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Run frontend unit tests
        working-directory: frontend
        run: npm run test

      - name: Frontend smoke test
        working-directory: frontend
        run: npm run smoke

      - name: Build frontend
        working-directory: frontend
        run: npm run build:ci

      - name: Validate frontend build artifacts
        working-directory: frontend
        run: |
          test -d dist
          test -n "$(find dist -type f -print -quit)"
          test ! -f build_error.txt

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: seahawk
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: seahawk
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U seahawk -d seahawk"
          --health-interval 4s
          --health-timeout 5s
          --health-retries 15
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://seahawk:testpass@localhost:5432/seahawk
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci_jwt_secret_must_be_at_least_32_characters_long
      JWT_REFRESH_SECRET: ci_refresh_secret_must_be_at_least_32_chars_xx
      NODE_ENV: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Prisma migrate and generate
        working-directory: backend
        run: npx prisma generate && npx prisma migrate deploy

      - name: Seed demo users for E2E
        working-directory: backend
        run: node src/utils/bootstrap-users.js --restore-demo

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install root dependencies (Playwright)
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Start backend
        working-directory: backend
        run: |
          node server.js > /tmp/seahawk-backend.log 2>&1 &
          echo "BACKEND_PID=$!" >> $GITHUB_ENV

      - name: Wait for API health
        run: |
          for i in $(seq 1 45); do
            if curl -sf http://127.0.0.1:3001/api/health > /dev/null; then
              echo "Backend is up"
              exit 0
            fi
            sleep 2
          done
          echo "--- backend log ---"
          cat /tmp/seahawk-backend.log || true
          exit 1

      - name: Start frontend dev server
        working-directory: frontend
        run: |
          npm run dev > /tmp/seahawk-frontend.log 2>&1 &
          echo "FRONTEND_PID=$!" >> $GITHUB_ENV

      - name: Wait for Vite
        run: |
          for i in $(seq 1 45); do
            if curl -sf http://127.0.0.1:5173/ > /dev/null; then
              echo "Frontend is up"
              exit 0
            fi
            sleep 2
          done
          echo "--- frontend log ---"
          cat /tmp/seahawk-frontend.log || true
          exit 1

      - name: Run Playwright E2E
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:5173
        run: npm run test:e2e

  deploy-staging:
    name: Deploy to Railway Staging
    needs: [test, e2e]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Notify staging deployment
        run: echo "✅ Tests passed — Railway staging auto-deploy should be triggered from develop"

      - name: Verify staging health endpoint
        env:
          HEALTHCHECK_URL: ${{ vars.STAGING_HEALTHCHECK_URL }}
        run: |
          test -n "$HEALTHCHECK_URL"
          curl --fail --silent --show-error "$HEALTHCHECK_URL/api/health"

  deploy-production:
    name: Deploy to Railway Production
    needs: [test, e2e]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Notify production deployment
        run: echo "✅ Tests passed — Railway production auto-deploy should be triggered from main"

      - name: Verify production health endpoint
        env:
          HEALTHCHECK_URL: ${{ vars.PRODUCTION_HEALTHCHECK_URL }}
        run: |
          test -n "$HEALTHCHECK_URL"
          curl --fail --silent --show-error "$HEALTHCHECK_URL/api/health"
