# docker-compose.yml — Local dev with Docker
# Usage: docker-compose up -d
version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       seahawk
      POSTGRES_USER:     seahawk
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changethis}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seahawk -d seahawk"]
      interval: 10s
      timeout:  5s
      retries:  5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV:   production
      PORT:       3001
      DATABASE_URL: postgresql://seahawk:${DB_PASSWORD:-changethis}@db:5432/seahawk
      JWT_SECRET:         ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
    ports:
      - "3001:3001"
    volumes:
      - ./logs:/app/logs
      - ./backups:/app/backups

volumes:
  postgres_data:
